<!DOCTYPE html>
<html>
<head>
  <title>India Job Update</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #007bff;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 10px;
    }

    .job-box {
      background: white;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
    }

    .btn {
      display: inline-block;
      padding: 6px 12px;
      margin-top: 5px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }

    .btn-blue {
      background: blue;
    }
  </style>
</head>

<body>

<header>
  <h2>India Job Update</h2>
</header>

<div class="container">

  <!-- Job 1 -->
  <div class="job-box">
    <h3>SSC GD Constable 2026</h3>
    <p>10th pass ke liye bharti</p>
    <a href="https://ssc.nic.in" target="_blank" class="btn">Apply</a>
  </div>

  <!-- Job 2 -->
  <div class="job-box">
    <h3>Railway Group D Vacancy</h3>
    <p>Railway me new recruitment</p>
    <a href="https://indianrailways.gov.in" target="_blank" class="btn">Apply</a>
  </div>

  <!-- Admit Card -->
  <div class="job-box">
    <h3>SSC MTS Admit Card</h3>
    <a href="https://ssc.nic.in" target="_blank" class="btn btn-blue">Download</a>
  </div>

  <!-- Result -->
  <div class="job-box">
    <h3>10th Result 2026</h3>
    <a href="https://results.nic.in" target="_blank" class="btn btn-blue">Check Result</a>
  </div>

</div>

</body>
</html>
